# Theme Check auf jedem Push (funktioniert ohne zusätzliche Secrets).
#
# Lighthouse-CI (shopify/lighthouse-ci-action) benötigt u.a. SHOP_STORE_OS2,
# SHOP_PASSWORD_OS2, SHOP_ACCESS_TOKEN, LHCI_GITHUB_TOKEN, SHOP_PULL_THEME.
# Wenn du diese Secrets im Repo hinterlegst, kann der Lighthouse-Job wieder ergänzt werden
# (Vorlage: https://github.com/Shopify/dawn/blob/main/.github/workflows/ci.yml).

name: CI
on: [push]
jobs:
  theme-check:
    name: Theme Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Theme Check
        uses: shopify/theme-check-action@v2
        with:
          token: ${{ github.token }}
